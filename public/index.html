<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Journal — Welcome</title>
  <!-- Inter & Plus Jakarta Sans Typeface Stack -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>

  <!-- Theme initialization script to prevent color/white flashes -->
  <script src="js/theme.js"></script>

  <!-- Global Glassmorphism Background Elements -->
  <div class="glow-bg" aria-hidden="true">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <div class="auth-layout">
    <!-- Top Floating Navbar Container -->
    <header class="auth-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 7H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 12H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 17H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Journal</span>
      </div>

      <button id="theme-toggle" class="btn-icon" aria-label="Toggle visual theme" title="Toggle Theme">
        <!-- Moon Icon -->
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <!-- Sun Icon -->
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>
    </header>

    <!-- Main Dynamic Auth Card Container -->
    <main class="auth-container">
      <div class="auth-card">
        
        <div class="auth-card-header">
          <h1 id="auth-title">Welcome back</h1>
          <p id="auth-subtitle" class="subtitle">Enter your credentials to access your secure developer journal workspace.</p>
        </div>

        <div class="tabs" role="tablist">
          <button id="tab-login" class="tab active" role="tab" aria-selected="true" onclick="showTab('login')">Login</button>
          <button id="tab-register" class="tab" role="tab" aria-selected="false" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form Configuration Area -->
        <div id="login-form" class="auth-form-panel">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="name@domain.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="••••••••••••" autocomplete="current-password" />
          </div>
          <button class="btn-primary auth-submit" id="btn-login" onclick="login()">
            <span>Sign In</span>
          </button>
        </div>

        <!-- Register Form Configuration Area -->
        <div id="register-form" class="auth-form-panel hidden">
          <div class="form-group">
            <label for="reg-email">Email Address</label>
            <input type="email" id="reg-email" placeholder="name@domain.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" placeholder="Minimum 8 premium characters" autocomplete="new-password" />
          </div>
          <button class="btn-primary auth-submit" id="btn-register" onclick="register()">
            <span>Create Account</span>
          </button>
        </div>

        <!-- Verification/Confirm Code Form Configuration Area -->
        <div id="confirm-form" class="auth-form-panel hidden">
          <div class="verification-notice">
            <div class="notice-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </div>
            <p>We sent a secure verification code token to your email inbox address.</p>
          </div>
          <div class="form-group">
            <label for="confirm-code">Verification Security Code</label>
            <input type="text" id="confirm-code" placeholder="123456" pattern="[0-9]*" inputmode="numeric" maxLength="6" />
          </div>
          <button class="btn-primary auth-submit" id="btn-verify" onclick="confirmUser()">
            <span>Verify & Complete</span>
          </button>
        </div>

      </div>
    </main>
  </div>

  <!-- Realtime Toast Notifications Pool Structure -->
  <div class="toast-container" id="toast-container" role="alert" aria-live="assertive"></div>

  <!-- Core App Controller Script Modules Injection -->
  <script src="js/index.js"></script>
</body>
</html>
